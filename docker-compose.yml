# Krita AI Studio - Docker Compose
# Frontend Angular + Backend Python FastAPI

services:
  krita-ai-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krita-ai-studio
    restart: unless-stopped
    
    environment:
      COMFYUI_HOST: ${COMFYUI_HOST:-comfyui.khlloreda.com}
      COMFYUI_PORT: ${COMFYUI_PORT:-80}
      COMFYUI_SECURE: ${COMFYUI_SECURE:-false}
      DATA_DIR: /app/data
      # Misma variable que moderación CivitAI: 0 = filtro LLM opcional en UI; 1/2 = filtro LLM obligatorio antes de ComfyUI
      CONTENT_FILTER: ${CONTENT_FILTER:-1}
      # OAuth Microsoft (Entra ID, single-tenant) — opcional; ver .env.example
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-}
      OAUTH_ADMIN_EMAILS: ${OAUTH_ADMIN_EMAILS:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3333}
      ALLOW_LEGACY_LOGIN: ${ALLOW_LEGACY_LOGIN:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    
    ports:
      - "${KRITA_HTTP_PORT:-3333}:3000"
    
    volumes:
      - krita-ai-data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  krita-ai-data:
